<!DOCTYPE html>
<html>
<head>
    <title>Orbit X Bode Plot App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <!-- LOGO + TITLE -->
    <div class="logo">
        <img src="{{ url_for('static', filename='orbitx.png') }}" alt="Orbit X">
        <h1>Orbit X Bode Plot</h1>
    </div>

    <!-- FORM -->
    <form method="POST">

        <h3>Resistance</h3>
        <div class="row">
            <input type="number" name="R_value" placeholder="Value" required>
            <select name="R_power">
                <option value="0">Ω</option>
                <option value="3">kΩ</option>
            </select>
        </div>

        <h3>Capacitance</h3>
        <div class="row">
            <input type="number" name="C_value" placeholder="Value" required>
            <select name="C_power">
                <option value="-6">µF</option>
                <option value="-9">nF</option>
            </select>
        </div>

        <button type="submit">Generate Bode Plot</button>
    </form>

    {% if fc %}
        <p class="result">Cutoff Frequency: {{ fc|round(2) }} Hz</p>
    {% endif %}

    {% if plot %}
        <div class="graph">
            <img src="{{ plot }}">
        </div>
    {% endif %}

</div>

</body>
</html>
